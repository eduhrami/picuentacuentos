<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=480, initial-scale=1.0">
    <title>RP4 Player - Stories</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .device {
            width: 480px;
            height: 320px;
            background: #F5F5F5;
            border: 8px solid #333;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .screen {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            padding: 15px;
            background: white;
            border-bottom: 1px solid #E0E0E0;
        }

        .back-button {
            background: none;
            border: none;
            font-size: 24px;
            color: #50C878;
            cursor: pointer;
            padding: 5px 15px;
            margin-right: 10px;
        }

        .title {
            font-size: 20px;
            font-weight: bold;
            color: #212121;
            flex: 1;
            text-align: center;
            margin-right: 50px;
        }

        .player-section {
            padding: 20px;
            background: white;
            border-bottom: 1px solid #E0E0E0;
        }

        .now-playing {
            font-size: 14px;
            color: #757575;
            margin-bottom: 5px;
        }

        .story-title {
            font-size: 20px;
            font-weight: bold;
            color: #212121;
            margin-bottom: 12px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #E0E0E0;
            border-radius: 3px;
            margin-bottom: 8px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #50C878, #3DA75F);
            width: 35%;
            transition: width 0.3s;
        }

        .time-labels {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #757575;
            margin-bottom: 15px;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            margin-bottom: 12px;
        }

        .control-button {
            background: none;
            border: none;
            font-size: 48px;
            cursor: pointer;
            transition: transform 0.2s;
            filter: grayscale(0.2);
        }

        .control-button:active {
            transform: scale(0.9);
        }

        .control-button.small {
            font-size: 36px;
        }

        .secondary-controls {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .secondary-button {
            background: #F5F5F5;
            border: 2px solid #E0E0E0;
            border-radius: 8px;
            padding: 8px 16px;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.2s;
        }

        .secondary-button:active {
            background: #E0E0E0;
        }

        .story-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px 15px;
        }

        .list-header {
            font-size: 14px;
            font-weight: bold;
            color: #757575;
            margin-bottom: 8px;
        }

        .story-item {
            padding: 12px;
            background: white;
            border-radius: 8px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s;
        }

        .story-item:active {
            background: #F5F5F5;
        }

        .story-item.playing {
            background: #E8F5E9;
            border: 2px solid #50C878;
        }

        .story-name {
            font-size: 14px;
            color: #212121;
        }

        .story-duration {
            font-size: 12px;
            color: #757575;
        }

        a {
            color: inherit;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="device">
        <div class="screen">
            <div class="header">
                <a href="home.html">
                    <button class="back-button">← Back</button>
                </a>
                <div class="title">BEDTIME STORIES</div>
            </div>

            <div class="player-section">
                <div class="now-playing">Now Playing:</div>
                <div class="story-title">🎵 The Three Little Pigs</div>

                <div class="progress-bar">
                    <div class="progress-fill"></div>
                </div>

                <div class="time-labels">
                    <span>2:35</span>
                    <span>8:45</span>
                </div>

                <div class="controls">
                    <button class="control-button small">⏮️</button>
                    <button class="control-button" id="playPause">⏸️</button>
                    <button class="control-button small">⏭️</button>
                </div>

                <div class="secondary-controls">
                    <button class="secondary-button">🔊 Volume: 75%</button>
                    <button class="secondary-button">⏲️ Timer: 30 min</button>
                </div>
            </div>

            <div class="story-list">
                <div class="list-header">Story List:</div>

                <div class="story-item playing">
                    <div class="story-name">🐷 The Three Little Pigs</div>
                    <div class="story-duration">8:45</div>
                </div>

                <div class="story-item">
                    <div class="story-name">🐻 Goldilocks and the Three Bears</div>
                    <div class="story-duration">6:20</div>
                </div>

                <div class="story-item">
                    <div class="story-name">🔴 Little Red Riding Hood</div>
                    <div class="story-duration">7:15</div>
                </div>

                <div class="story-item">
                    <div class="story-name">🌱 Jack and the Beanstalk</div>
                    <div class="story-duration">9:30</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Play/Pause toggle
        let isPlaying = true;
        document.getElementById('playPause').addEventListener('click', function() {
            isPlaying = !isPlaying;
            this.textContent = isPlaying ? '⏸️' : '▶️';
        });

        // Story item selection
        document.querySelectorAll('.story-item').forEach(item => {
            item.addEventListener('click', function() {
                document.querySelectorAll('.story-item').forEach(i => i.classList.remove('playing'));
                this.classList.add('playing');
            });
        });

        // Animate progress bar
        let progress = 35;
        setInterval(() => {
            if (isPlaying) {
                progress += 0.1;
                if (progress > 100) progress = 0;
                document.querySelector('.progress-fill').style.width = progress + '%';
            }
        }, 1000);
    </script>
</body>
</html>
