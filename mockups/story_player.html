<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=480, initial-scale=1.0">
    <title>PiCuentaCuentos - Stories</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .device {
            width: 480px;
            height: 320px;
            background: #F5F5F5;
            border: 8px solid #333;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            overflow: hidden;
            position: relative;
        }

        .wallpaper {
            position: absolute;
            inset: 0;
            background: url("../media/wallpapers/default.png") center/cover no-repeat;
            z-index: 0;
        }

        .wallpaper::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(245, 245, 245, 0.35);
        }

        .screen {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1;
        }

        .header {
            display: flex;
            align-items: center;
            padding: 15px;
            background: rgba(255, 255, 255, 0.92);
            border-bottom: 1px solid #E0E0E0;
            backdrop-filter: blur(4px);
        }

        .back-button {
            background: none;
            border: none;
            font-size: 24px;
            color: #50C878;
            cursor: pointer;
            padding: 5px 15px;
            margin-right: 10px;
        }

        .title {
            font-size: 20px;
            font-weight: bold;
            color: #212121;
            flex: 1;
            text-align: center;
            margin-right: 50px;
        }

        .player-section {
            padding: 14px 18px 16px;
            background: rgba(255, 255, 255, 0.94);
            border-bottom: 1px solid #E0E0E0;
        }

        .story-hero {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        .story-art {
            width: 64px;
            height: 64px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.12);
            overflow: hidden;
        }

        .story-art img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .now-playing {
            font-size: 14px;
            color: #757575;
            margin-bottom: 5px;
        }

        .story-title {
            font-size: 20px;
            font-weight: bold;
            color: #212121;
            margin-bottom: 6px;
        }

        .story-subtitle {
            font-size: 12px;
            color: #757575;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #E0E0E0;
            border-radius: 3px;
            margin-bottom: 8px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #50C878, #3DA75F);
            width: 35%;
            transition: width 0.3s;
        }

        .time-labels {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #757575;
            margin-bottom: 15px;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            margin-bottom: 12px;
        }

        .control-button {
            background: none;
            border: none;
            font-size: 48px;
            cursor: pointer;
            transition: transform 0.2s;
            filter: grayscale(0.2);
        }

        .control-button:active {
            transform: scale(0.9);
        }

        .control-button.small {
            font-size: 36px;
        }

        .secondary-controls {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .secondary-button {
            background: #F5F5F5;
            border: 2px solid #E0E0E0;
            border-radius: 8px;
            padding: 8px 16px;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.2s;
        }

        .secondary-button:active {
            background: #E0E0E0;
        }

        .story-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px 15px;
            display: none;
        }

        .list-header {
            font-size: 14px;
            font-weight: bold;
            color: #757575;
            margin-bottom: 8px;
        }

        .story-item {
            padding: 12px;
            background: rgba(255, 255, 255, 0.96);
            border-radius: 8px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s;
        }

        .story-item:active {
            background: #F5F5F5;
        }

        .story-item.playing {
            background: #E8F5E9;
            border: 2px solid #50C878;
        }

        .story-name {
            font-size: 14px;
            color: #212121;
        }

        .story-duration {
            font-size: 12px;
            color: #757575;
        }

        a {
            color: inherit;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="device">
        <div class="wallpaper"></div>
        <div class="screen">
            <div class="header">
                <a href="story_list.html">
                    <button class="back-button">← Back</button>
                </a>
                <div class="title">CUENTOS</div>
            </div>

            <div class="player-section">
                <div class="now-playing">Reproduciendo:</div>
                <div class="story-hero">
                    <div class="story-art">
                        <img src="../media/stories/liebre_y_tortuga.png" alt="La Liebre y la Tortuga">
                    </div>
                    <div>
                        <div class="story-title">La Liebre y la Tortuga</div>
                        <div class="story-subtitle">Fábula clásica</div>
                    </div>
                </div>

                <div class="progress-bar">
                    <div class="progress-fill"></div>
                </div>

                <div class="time-labels">
                    <span>2:35</span>
                    <span>8:45</span>
                </div>

                <div class="controls">
                    <button class="control-button small">⏮️</button>
                    <button class="control-button" id="playPause">⏸️</button>
                    <button class="control-button small">⏭️</button>
                </div>

                <div class="secondary-controls">
                    <button class="secondary-button">⏲️ Sueño: 30 min</button>
                </div>
            </div>

            <div class="story-list"></div>
        </div>
    </div>

    <script>
        // Play/Pause toggle
        let isPlaying = true;
        document.getElementById('playPause').addEventListener('click', function() {
            isPlaying = !isPlaying;
            this.textContent = isPlaying ? '⏸️' : '▶️';
        });

        // Animate progress bar
        let progress = 35;
        setInterval(() => {
            if (isPlaying) {
                progress += 0.1;
                if (progress > 100) progress = 0;
                document.querySelector('.progress-fill').style.width = progress + '%';
            }
        }, 1000);
    </script>
</body>
</html>
