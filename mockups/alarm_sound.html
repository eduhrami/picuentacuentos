<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=480, initial-scale=1.0">
    <title>PiCuentaCuentos - Alarm Sound</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .device {
            width: 480px;
            height: 320px;
            background: #F5F5F5;
            border: 8px solid #333;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            overflow: hidden;
            position: relative;
        }

        .wallpaper {
            position: absolute;
            inset: 0;
            background: url("../media/wallpapers/default.png") center/cover no-repeat;
            z-index: 0;
        }

        .wallpaper::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(245, 245, 245, 0.4);
        }

        .screen {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            background: rgba(255, 255, 255, 0.92);
            border-bottom: 1px solid #E0E0E0;
            backdrop-filter: blur(4px);
        }

        .back-button, .save-button {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            padding: 5px 10px;
        }

        .back-button {
            color: #4A90E2;
        }

        .save-button {
            color: #50C878;
            font-weight: bold;
        }

        .title {
            font-size: 20px;
            font-weight: bold;
            color: #212121;
        }

        .content {
            flex: 1;
            padding: 12px 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sound-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            flex: 1;
        }

        .sound-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            border: 2px solid transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 8px;
            gap: 6px;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
        }

        .sound-card.active {
            border-color: #50C878;
            box-shadow: 0 0 0 3px rgba(80, 200, 120, 0.2);
        }

        .sound-emoji {
            font-size: 30px;
        }

        .sound-name {
            font-size: 12px;
            color: #212121;
            text-align: center;
        }


        a {
            color: inherit;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="device">
        <div class="wallpaper"></div>
        <div class="screen">
            <div class="header">
                <a href="alarm_time.html">
                    <button class="back-button">Back</button>
                </a>
                <div class="title">Alarm Sound</div>
                <a href="alarm_list.html">
                    <button class="save-button">Save</button>
                </a>
            </div>

            <div class="content">
                <div class="sound-grid">
                    <div class="sound-card active">
                        <div class="sound-emoji">🐓</div>
                        <div class="sound-name">Gallo</div>
                    </div>
                    <div class="sound-card">
                        <div class="sound-emoji">🐻</div>
                        <div class="sound-name">Oso</div>
                    </div>
                    <div class="sound-card">
                        <div class="sound-emoji">🐸</div>
                        <div class="sound-name">Rana</div>
                    </div>
                    <div class="sound-card">
                        <div class="sound-emoji">🐦</div>
                        <div class="sound-name">Pajaritos</div>
                    </div>
                    <div class="sound-card">
                        <div class="sound-emoji">🐘</div>
                        <div class="sound-name">Elefante</div>
                    </div>
                    <div class="sound-card">
                        <div class="sound-emoji">🐱</div>
                        <div class="sound-name">Gatito</div>
                    </div>
                    <div class="sound-card">
                        <div class="sound-emoji">🌊</div>
                        <div class="sound-name">Olas</div>
                    </div>
                    <div class="sound-card">
                        <div class="sound-emoji">🌧️</div>
                        <div class="sound-name">Lluvia</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.querySelectorAll('.sound-card').forEach(card => {
            card.addEventListener('click', () => {
                document.querySelectorAll('.sound-card').forEach(c => c.classList.remove('active'));
                card.classList.add('active');
            });
        });
    </script>
</body>
</html>
