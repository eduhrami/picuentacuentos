<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=480, initial-scale=1.0">
    <title>PiCuentaCuentos - Alarm Time</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .device {
            width: 480px;
            height: 320px;
            background: #F5F5F5;
            border: 8px solid #333;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            overflow: hidden;
            position: relative;
        }

        .wallpaper {
            position: absolute;
            inset: 0;
            background: url("../media/wallpapers/default.png") center/cover no-repeat;
            z-index: 0;
        }

        .wallpaper::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(245, 245, 245, 0.4);
        }

        .screen {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            background: rgba(255, 255, 255, 0.92);
            border-bottom: 1px solid #E0E0E0;
            backdrop-filter: blur(4px);
        }

        .back-button, .next-button {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            padding: 5px 10px;
        }

        .back-button {
            color: #4A90E2;
        }

        .next-button {
            color: #50C878;
            font-weight: bold;
        }

        .title {
            font-size: 20px;
            font-weight: bold;
            color: #212121;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .time-picker {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .time-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .time-button {
            background: #F5F5F5;
            border: none;
            border-radius: 8px;
            width: 50px;
            height: 36px;
            font-size: 22px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .time-button:active {
            background: #E0E0E0;
        }

        .time-value {
            font-size: 40px;
            font-weight: bold;
            color: #212121;
            width: 70px;
            text-align: center;
        }

        .time-separator {
            font-size: 40px;
            font-weight: bold;
            color: #212121;
            margin: 0 5px;
        }

        .ampm-toggle {
            background: #4A90E2;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 16px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-left: 10px;
        }

        .section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 10px;
        }

        .sound-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .sound-pill {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(80, 200, 120, 0.15);
            color: #2f6b4a;
            font-weight: 600;
            font-size: 14px;
        }

        .sound-button {
            background: #4A90E2;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 8px 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .section-title {
            font-size: 16px;
            font-weight: bold;
            color: #757575;
            margin-bottom: 10px;
        }

        .day-selector {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .day-button {
            flex: 1;
            min-width: 52px;
            padding: 10px 8px;
            background: #F5F5F5;
            border: 2px solid #E0E0E0;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .day-button.active {
            background: #4A90E2;
            color: white;
            border-color: #4A90E2;
        }

        a {
            color: inherit;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="device">
        <div class="wallpaper"></div>
        <div class="screen">
            <div class="header">
                <a href="alarm_list.html">
                    <button class="back-button">Cancel</button>
                </a>
                <div class="title">Alarm Time</div>
                <a href="alarm_sound.html">
                    <button class="next-button">Next</button>
                </a>
            </div>

            <div class="content">
                <div class="time-picker">
                    <div class="time-column">
                        <button class="time-button">▲</button>
                        <div class="time-value" id="hour">06</div>
                        <button class="time-button">▼</button>
                    </div>
                    <div class="time-separator">:</div>
                    <div class="time-column">
                        <button class="time-button">▲</button>
                        <div class="time-value" id="minute">30</div>
                        <button class="time-button">▼</button>
                    </div>
                    <button class="ampm-toggle" id="ampm">AM</button>
                </div>

            <div class="section">
                <div class="section-title">Repeat</div>
                <div class="day-selector">
                    <button class="day-button active">Mon</button>
                    <button class="day-button active">Tue</button>
                    <button class="day-button active">Wed</button>
                    <button class="day-button active">Thu</button>
                    <button class="day-button active">Fri</button>
                    <button class="day-button">Sat</button>
                    <button class="day-button">Sun</button>
                </div>
            </div>

            <div class="section">
                <div class="section-title">Sound</div>
                <div class="sound-row">
                    <div class="sound-pill">🐓 Gallo</div>
                    <a href="alarm_sound.html">
                        <button class="sound-button">Change</button>
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

    <script>
        document.querySelectorAll('.day-button').forEach(btn => {
            btn.addEventListener('click', () => {
                btn.classList.toggle('active');
            });
        });

        document.getElementById('ampm').addEventListener('click', function() {
            this.textContent = this.textContent === 'AM' ? 'PM' : 'AM';
        });
    </script>
</body>
</html>
