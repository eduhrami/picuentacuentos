<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=480, initial-scale=1.0">
    <title>PiCuentaCuentos - Story List</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .device {
            width: 480px;
            height: 320px;
            background: #F5F5F5;
            border: 8px solid #333;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            overflow: hidden;
            position: relative;
        }

        .wallpaper {
            position: absolute;
            inset: 0;
            background: url("../media/wallpapers/default.png") center/cover no-repeat;
            z-index: 0;
        }

        .wallpaper::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(245, 245, 245, 0.35);
        }

        .screen {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1;
        }

        .header {
            display: flex;
            align-items: center;
            padding: 15px;
            background: rgba(255, 255, 255, 0.92);
            border-bottom: 1px solid #E0E0E0;
            backdrop-filter: blur(4px);
        }

        .back-button {
            background: none;
            border: none;
            font-size: 24px;
            color: #50C878;
            cursor: pointer;
            padding: 5px 15px;
            margin-right: 10px;
        }

        .title {
            font-size: 20px;
            font-weight: bold;
            color: #212121;
            flex: 1;
            text-align: center;
            margin-right: 50px;
        }

        .story-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px 15px 16px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .story-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 14px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            cursor: pointer;
            box-shadow: 0 6px 12px rgba(0,0,0,0.12);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .story-card:active {
            transform: scale(0.97);
        }

        .story-art {
            width: 100%;
            height: 90px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 38px;
            overflow: hidden;
        }

        .story-art img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .story-name {
            font-size: 14px;
            font-weight: 600;
            color: #212121;
        }

        .story-duration {
            font-size: 12px;
            color: #757575;
        }

        a {
            color: inherit;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="device">
        <div class="wallpaper"></div>
        <div class="screen">
            <div class="header">
                <a href="home.html">
                    <button class="back-button">← Back</button>
                </a>
                <div class="title">CUENTOS</div>
            </div>

            <div class="story-list">
                <a href="story_player.html">
                    <div class="story-card">
                        <div class="story-art">
                            <img src="../media/stories/chivos_chivones.png" alt="Chivos Chivones">
                        </div>
                        <div class="story-name">Chivos Chivones</div>
                        <div class="story-duration">8:05</div>
                    </div>
                </a>
                <a href="story_player.html">
                    <div class="story-card">
                        <div class="story-art">
                            <img src="../media/stories/liebre_y_tortuga.png" alt="La Liebre y la Tortuga">
                        </div>
                        <div class="story-name">Liebre y Tortuga</div>
                        <div class="story-duration">6:10</div>
                    </div>
                </a>
                <a href="story_player.html">
                    <div class="story-card">
                        <div class="story-art">
                            <img src="../media/stories/leon_y_raton.png" alt="El Leon y el Raton">
                        </div>
                        <div class="story-name">Leon y Raton</div>
                        <div class="story-duration">5:40</div>
                    </div>
                </a>
                <a href="story_player.html">
                    <div class="story-card">
                        <div class="story-art">
                            <img src="../media/stories/el_ave_rara.png" alt="El Ave Rara">
                        </div>
                        <div class="story-name">El Ave Rara</div>
                        <div class="story-duration">7:20</div>
                    </div>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
