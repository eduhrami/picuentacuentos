<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=480, initial-scale=1.0">
    <title>PiCuentaCuentos - Home Screen</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .device {
            width: 480px;
            height: 320px;
            background: #F5F5F5;
            border: 8px solid #333;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            overflow: hidden;
            position: relative;
        }

        .wallpaper {
            position: absolute;
            inset: 0;
            background: url("../media/wallpapers/default.png") center/cover no-repeat;
            z-index: 0;
        }

        .wallpaper::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(245, 245, 245, 0.4);
        }

        .screen {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .header {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 10px;
            text-align: center;
        }

        .time {
            font-size: 54px;
            font-weight: 800;
            color: #1f1f1f;
            letter-spacing: 1px;
            text-align: center;
        }

        .date {
            font-size: 18px;
            color: #5f5f5f;
        }

        .next-alarm {
            text-align: center;
            padding: 8px 16px;
            background: rgba(255, 243, 224, 0.92);
            border-radius: 999px;
            margin: 0 auto 15px;
            color: #E65100;
            font-size: 16px;
            width: fit-content;
        }

        .main-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            flex: 1;
            margin: 0 auto 10px;
            width: 100%;
            max-width: 320px;
        }

        .icon-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
            min-height: 90px;
        }

        .icon-button:active {
            transform: scale(0.95);
        }

        .icon-button.alarm {
            background: linear-gradient(135deg, #4A90E2 0%, #357ABD 100%);
            box-shadow: 0 4px 12px rgba(74, 144, 226, 0.4);
        }

        .icon-button.story {
            background: linear-gradient(135deg, #50C878 0%, #3DA75F 100%);
            box-shadow: 0 4px 12px rgba(80, 200, 120, 0.4);
        }

        .icon {
            font-size: 48px;
        }

        .settings-button {
            display: none;
        }

        /* Navigation bar */
        .nav-bar {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
        }

        .nav-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #BDBDBD;
        }

        .nav-dot.active {
            background: #4A90E2;
            width: 24px;
            border-radius: 4px;
        }

        a {
            color: inherit;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="device">
        <div class="wallpaper"></div>
        <div class="screen">
            <div class="header">
                <div>
                    <div class="time" id="time">07:35</div>
                    <div class="date" id="date">Mié, 5 Mar</div>
                </div>
            </div>

            <div class="next-alarm">
                ⏰ Proxima alarma: 6:30 AM
            </div>

            <div class="main-buttons">
                <a href="story_list.html">
                    <button class="icon-button story">
                        <div class="icon">📖</div>
                    </button>
                </a>

                <a href="alarm_list.html">
                    <button class="icon-button alarm">
                        <div class="icon">🔔</div>
                    </button>
                </a>

            </div>
        </div>

        <div class="nav-bar">
            <div class="nav-dot active"></div>
            <div class="nav-dot"></div>
            <div class="nav-dot"></div>
            <div class="nav-dot"></div>
        </div>
    </div>

    <script>
        // Update time
        function updateTime() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('es-MX', {
                hour: '2-digit',
                minute: '2-digit',
                hour12: false
            });
            const dateStr = now.toLocaleDateString('es-MX', {
                weekday: 'short',
                month: 'short',
                day: 'numeric'
            });

            document.getElementById('time').textContent = timeStr;
            document.getElementById('date').textContent = dateStr;
        }

        updateTime();
        setInterval(updateTime, 1000);
    </script>
</body>
</html>
